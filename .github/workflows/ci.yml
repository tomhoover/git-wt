name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure HEAD is on a named branch
        run: git symbolic-ref HEAD || git checkout -b ci-branch

      - uses: jdx/mise-action@v3

      - name: Install bats dependencies
        run: make deps

      - name: Lint
        run: make lint

      - name: Test
        run: make test-tap
