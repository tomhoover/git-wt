name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install bats dependencies
        run: make deps

      - name: Lint
        run: make lint

      - name: Test
        run: make test-tap
